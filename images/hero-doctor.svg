<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#c9e4ed"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Simple doctor icon -->
  <circle cx="300" cy="280" r="80" fill="#1e5f8a" opacity="0.2"/>
  <circle cx="300" cy="260" r="50" fill="#1e5f8a"/>
  <rect x="240" y="320" width="120" height="140" rx="10" fill="#1e5f8a"/>
  <rect x="260" y="340" width="80" height="100" rx="5" fill="white" opacity="0.3"/>
  <!-- Stethoscope hint -->
  <circle cx="300" cy="400" r="20" fill="none" stroke="#2c9676" stroke-width="4"/>
  <!-- Text -->
  <text x="300" y="550" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#1e5f8a">Dr. Clark Johnson</text>
  <text x="300" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">DPM, MS, FACFAS</text>
  <text x="300" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#718096">Board Certified Podiatrist</text>
</svg>
