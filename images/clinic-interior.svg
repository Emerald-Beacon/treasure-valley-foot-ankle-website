<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc"/>
      <stop offset="100%" style="stop-color:#edf2f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#wall)"/>
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#e2e8f0"/>
  <!-- Window -->
  <rect x="50" y="80" width="200" height="250" rx="5" fill="white" stroke="#cbd5e0" stroke-width="3"/>
  <line x1="150" y1="80" x2="150" y2="330" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="50" y1="205" x2="250" y2="205" stroke="#cbd5e0" stroke-width="2"/>
  <!-- Plant -->
  <rect x="280" y="350" width="60" height="100" rx="5" fill="#2c9676" opacity="0.6"/>
  <ellipse cx="310" cy="340" rx="50" ry="40" fill="#2c9676"/>
  <ellipse cx="320" cy="320" rx="40" ry="35" fill="#38a169"/>
  <!-- Chairs -->
  <rect x="420" y="380" width="100" height="70" rx="10" fill="#1e5f8a"/>
  <rect x="420" y="320" width="100" height="60" rx="10" fill="#1e5f8a"/>
  <rect x="560" y="380" width="100" height="70" rx="10" fill="#1e5f8a"/>
  <rect x="560" y="320" width="100" height="60" rx="10" fill="#1e5f8a"/>
  <!-- Small table -->
  <rect x="530" y="400" width="30" height="50" fill="#4a5568"/>
  <ellipse cx="545" cy="395" rx="25" ry="10" fill="#4a5568"/>
  <!-- Text -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1e5f8a">Modern, Comfortable Clinic</text>
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#718096">Welcoming environment for all patients</text>
</svg>
