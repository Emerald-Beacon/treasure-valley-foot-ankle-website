<svg xmlns="http://www.w3.org/2000/svg" width="500" height="600" viewBox="0 0 500 600">
  <defs>
    <linearGradient id="portrait" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7fa"/>
      <stop offset="100%" style="stop-color:#d4e8f0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="600" fill="url(#portrait)"/>
  <!-- Head -->
  <circle cx="250" cy="180" r="100" fill="#e8c4a0"/>
  <!-- Hair -->
  <ellipse cx="250" cy="130" rx="90" ry="60" fill="#4a3728"/>
  <!-- Eyes -->
  <ellipse cx="215" cy="175" rx="12" ry="8" fill="#2d3748"/>
  <ellipse cx="285" cy="175" rx="12" ry="8" fill="#2d3748"/>
  <!-- Smile -->
  <path d="M 220 210 Q 250 240 280 210" fill="none" stroke="#2d3748" stroke-width="3"/>
  <!-- Lab coat -->
  <path d="M 150 280 L 170 400 L 330 400 L 350 280 Q 250 320 150 280" fill="white"/>
  <path d="M 170 400 L 180 500 L 320 500 L 330 400" fill="white"/>
  <!-- Collar -->
  <path d="M 200 280 L 250 350 L 300 280" fill="none" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Stethoscope -->
  <path d="M 230 310 Q 250 380 270 310" fill="none" stroke="#1e5f8a" stroke-width="4"/>
  <circle cx="250" cy="385" r="15" fill="none" stroke="#1e5f8a" stroke-width="4"/>
  <!-- Text -->
  <text x="250" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#1e5f8a">Dr. Clark Johnson</text>
  <text x="250" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">DPM, MS, FACFAS</text>
</svg>
