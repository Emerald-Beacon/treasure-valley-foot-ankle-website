<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="examBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5f8a"/>
      <stop offset="100%" style="stop-color:#164a6d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#examBg)"/>
  <!-- Foot icon -->
  <ellipse cx="200" cy="180" rx="60" ry="100" fill="white" opacity="0.9" transform="rotate(-15 200 180)"/>
  <!-- Toes -->
  <ellipse cx="145" cy="110" rx="15" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="165" cy="95" rx="13" ry="18" fill="white" opacity="0.9"/>
  <ellipse cx="185" cy="88" rx="12" ry="16" fill="white" opacity="0.9"/>
  <ellipse cx="205" cy="88" rx="11" ry="15" fill="white" opacity="0.9"/>
  <ellipse cx="222" cy="95" rx="10" ry="14" fill="white" opacity="0.9"/>
  <!-- Magnifying glass -->
  <circle cx="280" cy="220" r="50" fill="none" stroke="white" stroke-width="6"/>
  <line x1="315" y1="255" x2="350" y2="290" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="white">Expert Examination</text>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">Comprehensive foot &amp; ankle care</text>
</svg>
